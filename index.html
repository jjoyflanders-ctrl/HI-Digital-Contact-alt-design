<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>HI | Connect</title>

  <!-- Font -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Barlow+Semi+Condensed:wght@300;400;500;600;700&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <main class="app" aria-live="polite">
    <!-- DESKTOP -->
    <section class="desk" aria-label="Desktop business card">
      <div class="desk-shell">
        <button class="desk-searchBtn" id="deskSearchBtn" type="button" aria-label="Find employee">
          <span class="ico" aria-hidden="true" data-ico="search"></span>
        </button>

        <div class="desk-left">
          <div class="desk-photoRing">
            <img id="deskPhoto" alt="Employee photo" />
          </div>
        </div>

        <div class="desk-right">
          <h1 class="desk-name" id="deskName">Loading…</h1>
          <div class="desk-title" id="deskTitle"></div>

          <div class="desk-lines">
            <div class="line">
              <span class="chip"><span class="ico" aria-hidden="true" data-ico="phone"></span></span>
              <a id="deskPhone" href="#" class="lineText">—</a>
            </div>
            <div class="line">
              <span class="chip"><span class="ico" aria-hidden="true" data-ico="email"></span></span>
              <a id="deskEmail" href="#" class="lineText">—</a>
            </div>
            <div class="line">
              <span class="chip"><span class="ico" aria-hidden="true" data-ico="web"></span></span>
              <a id="deskWeb" href="#" class="lineText" target="_blank" rel="noopener">—</a>
            </div>
          </div>
        </div>

        <!-- Green bar aligned to circle edge -->
        <div class="desk-bar" id="deskBar">
          <button class="pill" id="deskVcardBtn" type="button">Save to Contacts</button>
          <button class="pill" id="deskShareBtn" type="button">Send to Phone</button>
        </div>
      </div>
    </section>

    <!-- MOBILE -->
    <section class="mobi" aria-label="Mobile business card">
      <div class="mobi-shell">
        <div class="mobi-top">
          <img class="mobi-hero" id="mobiHero" alt="Company building" />
        </div>

        <div class="mobi-card">
          <div class="mobi-row">
            <div class="mobi-qrWrap" aria-label="QR code">
              <img id="mobiQR" alt="QR code for this contact" />
            </div>

            <div class="mobi-actions" aria-label="Quick actions">
              <a class="roundBtn" id="mobiCall" href="#" aria-label="Call">
                <span class="ico" aria-hidden="true" data-ico="phoneSolid"></span>
              </a>
              <a class="roundBtn" id="mobiEmail" href="#" aria-label="Email">
                <span class="ico" aria-hidden="true" data-ico="emailSolid"></span>
              </a>
              <a class="roundBtn" id="mobiWeb" href="#" aria-label="Website">
                <span class="ico" aria-hidden="true" data-ico="webSolid"></span>
              </a>
            </div>
          </div>

          <div class="mobi-name" id="mobiName">Loading…</div>
          <div class="mobi-title" id="mobiTitle"></div>

          <div class="mobi-info">
            <div class="infoBlock">
              <div class="infoLabel">Call</div>
              <a id="mobiPhoneText" href="#">—</a>
            </div>
            <div class="infoBlock">
              <div class="infoLabel">Email</div>
              <a id="mobiEmailText" href="#">—</a>
            </div>
            <div class="infoBlock">
              <div class="infoLabel">Website</div>
              <a id="mobiWebText" href="#" target="_blank" rel="noopener">—</a>
            </div>
          </div>

          <!-- Floating bottom bar -->
          <div class="floatBar" role="toolbar" aria-label="Share, search, and add to contacts">
            <button class="floatIcon" id="mobiShareBtn" type="button" aria-label="Share">
              <span class="ico" aria-hidden="true" data-ico="share"></span>
            </button>
            <button class="floatIcon" id="mobiSearchBtn" type="button" aria-label="Search employees">
              <span class="ico" aria-hidden="true" data-ico="search"></span>
            </button>
            <button class="floatCTA" id="mobiVcardBtn" type="button" aria-label="Add to contacts">
              <span>Add to<br/>Contacts</span>
              <span class="plus" aria-hidden="true">+</span>
            </button>
          </div>
        </div>
      </div>
    </section>

    <!-- MODALS -->
    <div class="backdrop" id="modalBackdrop" hidden></div>

    <dialog class="modal" id="searchModal" aria-label="Search employees">
      <div class="modalHead">
        <div class="modalTitle">Find an employee</div>
        <button class="xBtn" id="closeSearch" type="button" aria-label="Close">×</button>
      </div>
      <div class="modalBody">
        <input id="searchInput" class="searchInput" type="search" placeholder="Type a name…" autocomplete="off" />
        <div id="searchResults" class="results"></div>
      </div>
    </dialog>

    <dialog class="modal" id="qrModal" aria-label="Share via QR code">
      <div class="modalHead">
        <div class="modalTitle">Share</div>
        <button class="xBtn" id="closeQR" type="button" aria-label="Close">×</button>
      </div>
      <div class="modalBody qrBody">
        <div class="qrBigWrap">
          <img id="deskQR" alt="QR code for sharing" />
        </div>
        <div class="qrMeta">
          <div class="qrUrl" id="shareUrlText"></div>
          <div class="qrBtns">
            <button class="miniBtn" id="copyLinkBtn" type="button">Copy link</button>
            <button class="miniBtn" id="nativeShareBtn" type="button">Share…</button>
          </div>
        </div>
      </div>
    </dialog>

    <div class="toast" id="toast" role="status" aria-live="polite"></div>
  </main>

  <script src="app.js" defer></script>
</body>
</html>
